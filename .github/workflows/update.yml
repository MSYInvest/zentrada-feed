name: Update Zentrada Feed

on:
  schedule:
    - cron: "0 3 * * *"   # every day 03:00 UTC = 05:00 Brussels
  workflow_dispatch:        # manual trigger anytime

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate CSV
        run: python generate.py

      - name: Commit & push
        run: |
          git config user.name "Zentrada Bot"
          git config user.email "actions@github.com"
          git add zentrada_feed.csv
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "Update feed $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
